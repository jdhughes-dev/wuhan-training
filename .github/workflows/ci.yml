name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # nightly at 06:00 UTC - also catches the pinned MODFLOW 6 nightly tag
    # disappearing from the modflow6-nightly-build releases.
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: pixi install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      # Build MODFLOW 6 only in the explicit step below, not from the activation
      # hook on every `pixi run`.
      WUHAN_SKIP_MF6_BUILD: "1"
    strategy:
      fail-fast: false
      matrix:
        # macos-latest = Apple Silicon (osx-arm64); macos-15-intel = Intel (osx-64)
        os: [ubuntu-latest, macos-latest, macos-15-intel, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Set up pixi and install the locked environment
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          locked: true
          cache: true

      - name: Build/download parallel MODFLOW 6 (fresh build)
        # --force so it rebuilds even if setup-pixi restored an env from cache
        # that still contains a previously built mf6.
        run: pixi run get-mf6 --force

      - name: Verify MODFLOW 6 runs
        run: pixi run python -c "import shutil, subprocess; exe = shutil.which('mf6'); assert exe, 'mf6 not found on PATH'; print(exe); subprocess.run([exe, '-v'], check=True)"

      - name: Verify Python packages import
        run: pixi run python -c "import flopy, pyemu, pypestutils, pandas, numpy, scipy, matplotlib, shapely, pyproj; print('flopy', flopy.__version__); print('pyemu', pyemu.__version__)"

      - name: Verify PEST++ is available
        run: pixi run python -c "import shutil; assert shutil.which('pestpp-ies'), 'pestpp-ies not found on PATH'; print(shutil.which('pestpp-ies'))"

      - name: Install MODFLOW executables (mp7, gridgen, triangle)
        # get-modflow queries the GitHub API for the release; authenticate to
        # avoid the low unauthenticated rate limit (HTTP 403) on shared runners.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pixi run get-exes

      - name: Clone notebook repos
        run: pixi run get-notebooks

      - name: Re-run notebook sync (up-to-date / idempotent path)
        run: pixi run get-notebooks

      - name: Verify notebooks were cloned
        run: pixi run python -c "import os; missing = [d for d in ('GMDSI_notebooks', 'mf6-training') if not os.path.isdir(os.path.join(d, '.git'))]; assert not missing, 'not cloned ' + str(missing); print('notebooks ok')"

      - name: Run GMDSI pstfrom tutorial notebook
        # Skipped on Intel mac: USGS no longer ships working x86_64 mac MODFLOW
        # binaries (release 25.0 mp7 hardcodes a Homebrew gcc@12 libgcc_s path
        # that is absent on a clean runner). The notebook runs on linux, windows
        # and macOS-arm64; Intel mac still gets the full env install/build above.
        if: matrix.os != 'macos-15-intel'
        run: pixi run python scripts/run_notebook.py GMDSI_notebooks/tutorials/part2_01_pstfrom_pest_setup/freyberg_pstfrom_pest_setup.ipynb 1800
